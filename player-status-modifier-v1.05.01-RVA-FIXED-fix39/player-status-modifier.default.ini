[General]
Enabled=1
LogEnabled=1
; verbose=1 keeps full debug logging and disables the line cap.
; verbose=0 enables capped logging for normal gameplay.
verbose=0
; Used only when verbose=0. Once the log reaches this line count, new lines stop appending
; until you raise the cap, delete the log, or switch verbose back to 1.
MaxLogLines=2000
InitDelayMs=3000
StaleComponentMs=60000
RelockIdleMs=10000

[OutgoingDamage]
Enabled=1
; Uses the narrower damage hook by default. Enable this only if a damage type is missed.
UseStatWriteFallback=0
Multiplier=2.0

[IncomingDamage]
; When Enabled=1, this combines with [Health] ConsumptionMultiplier for player incoming damage.
Enabled=0
UseStatWriteFallback=0
Multiplier=1.0

[Items]
GainMultiplier=2.0

[Affinity]
Multiplier=1.0

[Durability]
ConsumptionChance=100.0

[Mount]
Enabled=0
LockHealth=1
LockStamina=1
; LockValue is clamped to each mount stat max. 9999999 means lock to max for normal mounts.
LockValue=9999999

[DragonLimit]
roof_summon_experimental=0
village_summon=1
cancel_restrict_flying=1

[Position Control(Height)]
Enable=0
Key=117
Amplitude=0.1

[Position Control(Horizontal)]
Enable=0
Key=118
Multiplier=1.5

[Resistance]
; Validated for v1.05.01 as an incoming-health resistance multiplier.
; The executable contains FireResistance, IceResistance and ElectricityResistance status names,
; but the available damage hook exposes the target status id (health=0), not the element id.
; Therefore this applies the highest configured resistance to tracked player incoming health writes.
; Example: Fire=0.75, Ice=0, Electricity=0 => additional incoming damage multiplier = 0.25.
Enabled=0
FireResistance=0.75
IceResistance=0.75
ElectricityResistance=0.75
; Legacy alias accepted: LightningResistance

[Health]
Enabled=1
ConsumptionMultiplier=0.5
HealMultiplier=2.0

[Stamina]
Enabled=1
ConsumptionMultiplier=0.5
HealMultiplier=1.0

[Spirit]
Enabled=1
ConsumptionMultiplier=0.5
HealMultiplier=2.0
