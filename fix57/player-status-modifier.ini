[General]
Enabled=1
LogEnabled=1
; verbose=1 keeps full debug logging and disables the line cap.
; verbose=0 enables capped logging for normal gameplay.
verbose=0
MaxLogLines=2000
InitDelayMs=3000
StaleComponentMs=60000
RelockIdleMs=10000

[OutgoingDamage]
Enabled=1
; Uses the narrower damage hook by default. Enable this only if a damage type is missed.
UseStatWriteFallback=0
Multiplier=2.0

[IncomingDamage]
; Incoming damage also combines with [Health] ConsumptionMultiplier when health is enabled.
Enabled=0
UseStatWriteFallback=0
Multiplier=1.0

[Items]
GainMultiplier=2.0

[Affinity]
Multiplier=1.0
; Diagnostic-only. These install extra read-only probes and increase logging.
GiftDiagnostics=0
PetDiagnostics=0

[Durability]
ConsumptionChance=100.0

[Mount]
Enabled=0
LockHealth=1
LockStamina=1
; LockValue is clamped to each mount stat max. 9999999 means lock to max for normal mounts.
LockValue=9999999

[DragonLimit]
roof_summon_experimental=0
village_summon=0
cancel_restrict_flying=0

[Position Control(Height)]
Enable=0
Key=117
Amplitude=0.1

[Position Control(Horizontal)]
Enable=0
Key=118
Multiplier=1.5

[Resistance]
Enabled=0
FireResistance=0.75
IceResistance=0.75
ElectricityResistance=0.75
; Legacy alias accepted: LightningResistance

[Health]
Enabled=1
ConsumptionMultiplier=0.5
HealMultiplier=2.0

[Stamina]
Enabled=1
ConsumptionMultiplier=0.5
HealMultiplier=1.0

[Spirit]
Enabled=1
ConsumptionMultiplier=0.5
HealMultiplier=2.0
